name: Release

# Build, codesign (Developer ID), notarize, staple, and package Mown, then
# attach the artifacts to a GitHub Release. Mirrors the local
# `.claude/skills/release/release.sh` pipeline — the same script runs here,
# unmodified; CI only reconstructs the keychain state it expects (a Developer
# ID identity + a "MownNotary" notary profile) from repository secrets.
#
# Triggers:
#   - push a tag like `v0.1.0`  → builds and publishes a GitHub Release
#   - manual "Run workflow"     → builds and uploads artifacts only (no Release)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release on tag builds

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version

      # Recreate the Developer ID signing identity in an ephemeral keychain so
      # `release.sh`'s `security find-identity` autodetection finds it, exactly
      # like on the developer's Mac.
      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/mown-build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"   # ephemeral; the keychain dies with the runner
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"   # no early auto-lock
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/developer-id.p12" -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          # Let codesign use the private key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Make this keychain the default and put it on the search list so both
          # codesign and notarytool (the MownNotary profile, stored next) resolve
          # against it.
          existing="$(security list-keychains -d user | sed -e 's/\"//g' -e 's/^[[:space:]]*//')"
          security list-keychains -d user -s "$KEYCHAIN" $existing
          security default-keychain -s "$KEYCHAIN"

          rm -f "$RUNNER_TEMP/developer-id.p12"
          echo "Installed identities:"
          security find-identity -v -p codesigning

      # Store notary credentials under the same "MownNotary" profile name the
      # script passes to `notarytool --keychain-profile`.
      - name: Store notarization credentials
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_APP_PASSWORD: ${{ secrets.NOTARY_APP_PASSWORD }}
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials "MownNotary" \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_APP_PASSWORD"

      - name: Build · sign · notarize · staple · package
        run: bash .claude/skills/release/release.sh --dmg

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mown-dist
          path: |
            dist/*.zip
            dist/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.zip dist/*.dmg \
            --title "Mown $GITHUB_REF_NAME" --generate-notes
