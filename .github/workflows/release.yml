name: Release

# Build, codesign (Developer ID), notarize, staple, and package Mown, attach
# the artifacts to a GitHub Release, then bump the Homebrew cask in the separate
# Jun-Jin/homebrew-mown tap. Mirrors the local `scripts/release.sh` pipeline —
# the same script runs here, unmodified; CI only reconstructs the keychain state
# it expects (a Developer ID identity + a "MownNotary" notary profile) from
# repository secrets.
#
# Triggers:
#   - push a tag like `v0.1.0`  → builds, publishes a Release, bumps the tap
#   - manual "Run workflow"     → builds and uploads artifacts only (no Release)
#
# Secrets used: DEVELOPER_ID_P12_BASE64, P12_PASSWORD, NOTARY_APPLE_ID,
# NOTARY_TEAM_ID, NOTARY_APP_PASSWORD, and HOMEBREW_TAP_TOKEN (a fine-grained
# PAT with Contents: read/write on homebrew-mown, for the cross-repo cask bump).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release on tag builds

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Mown.xcodeproj is objectVersion 77 (Xcode 16+ synchronized-folder
      # format); the image's default Xcode may be older and would fail with
      # "Unable to read project". Select the newest Xcode the runner has.
      - name: Select latest Xcode
        run: |
          set -euo pipefail
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)"
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest"; fi
          xcodebuild -version

      # Recreate the Developer ID signing identity in an ephemeral keychain so
      # `release.sh`'s `security find-identity` autodetection finds it, exactly
      # like on the developer's Mac.
      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/mown-build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"   # ephemeral; the keychain dies with the runner
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"   # no early auto-lock
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/developer-id.p12" -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          # Let codesign use the private key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Make this keychain the default and put it on the search list so both
          # codesign and notarytool (the MownNotary profile, stored next) resolve
          # against it.
          existing="$(security list-keychains -d user | sed -e 's/\"//g' -e 's/^[[:space:]]*//')"
          security list-keychains -d user -s "$KEYCHAIN" $existing
          security default-keychain -s "$KEYCHAIN"

          rm -f "$RUNNER_TEMP/developer-id.p12"
          echo "Installed identities:"
          security find-identity -v -p codesigning

      # Store notary credentials under the same "MownNotary" profile name the
      # script passes to `notarytool --keychain-profile`.
      - name: Store notarization credentials
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_APP_PASSWORD: ${{ secrets.NOTARY_APP_PASSWORD }}
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials "MownNotary" \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_APP_PASSWORD"

      - name: Build · sign · notarize · staple · package
        run: bash scripts/release.sh --dmg

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mown-dist
          path: |
            dist/*.zip
            dist/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.zip dist/*.dmg \
            --title "Mown $GITHUB_REF_NAME" --generate-notes

      # ── Bump the Homebrew cask in the separate tap repo ──────────────────────
      # The cask lives in Jun-Jin/homebrew-mown, a different repo, so the
      # built-in GITHUB_TOKEN (scoped to this repo) can't push to it. A
      # fine-grained PAT with Contents: read/write on homebrew-mown, stored as
      # the HOMEBREW_TAP_TOKEN secret, authorizes the cross-repo push. Runs only
      # on tag builds, after the release assets exist (the cask url points at
      # them). A failure here flags a stale tap without un-publishing the release.
      - name: Check out Homebrew tap
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/checkout@v4
        with:
          repository: Jun-Jin/homebrew-mown
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Bump cask to released version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP="$GITHUB_WORKSPACE/dist/Mown-${VERSION}.zip"
          [ -f "$ZIP" ] || { echo "::error::$ZIP not found"; exit 1; }
          # Hash the exact artifact that was just uploaded to the Release.
          SHA="$(shasum -a 256 "$ZIP" | awk '{print $1}')"
          echo "Bumping cask → version $VERSION, sha256 $SHA"

          # BSD sed (macOS runner): rewrite the pinned version + checksum.
          sed -i '' -E \
            -e "s/^  version \".*\"/  version \"${VERSION}\"/" \
            -e "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" \
            Casks/mown.rb

          if git diff --quiet; then
            echo "Cask already at ${VERSION}; nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "mown ${VERSION}"
          git push
